<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="max-width:600px;margin:0 auto;padding:20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="text-align:center;padding:20px 0;border-bottom:2px solid #1a73e8;margin-bottom:24px;">
    <h1 style="color:#333;font-size:24px;margin:0;">🚀 今日创业点子推荐</h1>
    <p style="color:#888;font-size:14px;margin:8px 0 0;">{{date}} · 共 {{count}} 条精选</p>
  </div>
  {{items}}
  <hr style="margin:32px 0;border:none;border-top:1px solid #eee;">
  <p style="color:#aaa;font-size:12px;text-align:center;line-height:1.6;">
    🤖 由 AI 轻创业日报自动生成<br>
    数据源: Reddit + 知乎 + RSS<br>
    <a href="mailto:{{from}}" style="color:#1a73e8;">退订回复此邮件</a>
  </p>
</body>
</html>
